<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿城AI - 地板铺贴</title>
    <link rel="stylesheet" href="styles/floor-pattern.css">
</head>
<body>
    <div class="page-container">
        <header class="page-header">
            <div class="header-left">
                <button class="back-btn" id="back-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"></path>
                    </svg>
                    <span>返回</span>
                </button>
                <h1 class="page-title">地板铺贴</h1>
            </div>
            <div class="header-right">
                <button class="save-btn" id="save-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12v7a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2v-7"></path>
                        <polyline points="17 3 12 8 7 3"></polyline>
                        <line x1="12" y1="8" x2="12" y2="15"></line>
                    </svg>
                    <span>保存</span>
                </button>
            </div>
        </header>

        <main class="main-content">
            <aside class="pattern-panel">
                <h3 class="panel-title">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v9"></path>
                        <polyline points="3 21 12 12 21 21"></polyline>
                    </svg>
                    地板材质
                </h3>
                
                <div class="pattern-categories">
                    <button class="category-btn active" data-category="wood">木纹</button>
                    <button class="category-btn" data-category="marble">大理石</button>
                    <button class="category-btn" data-category="tile">瓷砖</button>
                    <button class="category-btn" data-category="carpet">地毯</button>
                </div>

                <div class="pattern-grid" id="pattern-grid">
                    <div class="pattern-item" data-pattern="wood-1">
                        <div class="pattern-preview wood-pattern-1"></div>
                        <span class="pattern-name">原木色</span>
                    </div>
                    <div class="pattern-item" data-pattern="wood-2">
                        <div class="pattern-preview wood-pattern-2"></div>
                        <span class="pattern-name">胡桃木</span>
                    </div>
                    <div class="pattern-item" data-pattern="wood-3">
                        <div class="pattern-preview wood-pattern-3"></div>
                        <span class="pattern-name">橡木</span>
                    </div>
                    <div class="pattern-item" data-pattern="wood-4">
                        <div class="pattern-preview wood-pattern-4"></div>
                        <span class="pattern-name">柚木</span>
                    </div>
                    <div class="pattern-item" data-pattern="wood-5">
                        <div class="pattern-preview wood-pattern-5"></div>
                        <span class="pattern-name">松木</span>
                    </div>
                    <div class="pattern-item" data-pattern="wood-6">
                        <div class="pattern-preview wood-pattern-6"></div>
                        <span class="pattern-name">檀木</span>
                    </div>
                </div>
            </aside>

            <section class="preview-section">
                <div class="section-header">
                    <h2 class="section-title">铺贴预览</h2>
                    <div class="view-controls">
                        <button class="view-btn active" data-view="2d">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="3" y="3" width="18" height="18" rx="1"></rect>
                                <line x1="3" y1="9" x2="21" y2="9"></line>
                                <line x1="3" y1="15" x2="21" y2="15"></line>
                            </svg>
                            <span>2D</span>
                        </button>
                        <button class="view-btn" data-view="3d">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                                <line x1="12" y1="22.08" x2="12" y2="12"></line>
                            </svg>
                            <span>3D</span>
                        </button>
                    </div>
                </div>

                <div class="preview-container">
                    <div class="room-preview" id="room-preview">
                        <div class="room-layout">
                            <div class="room-wall north"></div>
                            <div class="room-wall south"></div>
                            <div class="room-wall east"></div>
                            <div class="room-wall west"></div>
                            <div class="floor-area" id="floor-area">
                                <div class="floor-grid" id="floor-grid"></div>
                            </div>
                            <div class="room-label">客厅 4.5m × 5.2m</div>
                        </div>
                    </div>
                </div>

                <div class="floor-settings">
                    <div class="setting-row">
                        <label>铺贴方向</label>
                        <div class="direction-buttons">
                            <button class="direction-btn active" data-direction="horizontal">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="3" y1="12" x2="21" y2="12"></line>
                                </svg>
                                <span>横向</span>
                            </button>
                            <button class="direction-btn" data-direction="vertical">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="3" x2="12" y2="21"></line>
                                </svg>
                                <span>纵向</span>
                            </button>
                            <button class="direction-btn" data-direction="diagonal">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="3" y1="3" x2="21" y2="21"></line>
                                </svg>
                                <span>斜向</span>
                            </button>
                        </div>
                    </div>

                    <div class="setting-row">
                        <label>缝隙宽度</label>
                        <div class="gap-control">
                            <input type="range" id="gap-slider" min="0" max="10" value="2">
                            <span id="gap-value">2</span>
                            <span class="gap-unit">mm</span>
                        </div>
                    </div>

                    <div class="setting-row">
                        <label>板材规格</label>
                        <select class="spec-select">
                            <option value="900x120">900×120mm</option>
                            <option value="1200x150">1200×150mm</option>
                            <option value="1500x150">1500×150mm</option>
                            <option value="1800x150">1800×150mm</option>
                            <option value="600x600">600×600mm</option>
                        </select>
                    </div>
                </div>
            </section>

            <aside class="info-panel">
                <div class="info-card">
                    <h3 class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="4" y="4" width="16" height="16" rx="1"></rect>
                            <line x1="4" y1="10" x2="20" y2="10"></line>
                            <line x1="4" y1="14" x2="16" y2="14"></line>
                        </svg>
                        铺贴信息
                    </h3>
                    <div class="info-grid">
                        <div class="info-item">
                            <span class="info-label">房间面积</span>
                            <span class="info-value">23.4<span class="info-unit">㎡</span></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">板材用量</span>
                            <span class="info-value">156<span class="info-unit">片</span></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">损耗率</span>
                            <span class="info-value">5<span class="info-unit">%</span></span>
                        </div>
                        <div class="info-item">
                            <span class="info-label">预估费用</span>
                            <span class="info-value">¥8,500</span>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <h3 class="card-title">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                        </svg>
                        操作提示
                    </h3>
                    <ul class="tip-list">
                        <li>点击选择地板材质</li>
                        <li>调整铺贴方向和缝隙</li>
                        <li>切换2D/3D视图预览</li>
                        <li>点击保存完成铺贴</li>
                    </ul>
                </div>
            </aside>
        </main>
    </div>

    <script src="js/floor-pattern.js"></script>
</body>
</html>
