<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>睿城AI 3D建造 - 忘记密码</title>
    <link rel="stylesheet" href="styles/login.css">
    <style>
        :root {
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.8);
            --text-muted: rgba(255, 255, 255, 0.6);
            --accent-primary: #00c8ff;
            --accent-secondary: #0066ff;
            --border-color: rgba(0, 200, 255, 0.3);
        }

        .step-indicator {
            display: flex;
            justify-content: center;
            margin-bottom: 30px;
            gap: 40px;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: rgba(0, 200, 255, 0.15);
            border: 2px solid rgba(0, 200, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.8);
            transition: all 0.3s ease;
        }

        .step.active .step-number {
            background: linear-gradient(135deg, #00c8ff, #0066ff);
            border-color: #00c8ff;
            color: white;
        }

        .step.completed .step-number {
            background: rgba(0, 255, 136, 0.2);
            border-color: #00ff88;
            color: #00ff88;
        }

        .step-label {
            margin-top: 10px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }

        .step.active .step-label {
            color: #00c8ff;
        }

        .step.completed .step-label {
            color: #00ff88;
        }

        .step::after {
            content: '';
            position: absolute;
            top: 32%;
            left: 91%;
            transform: translateY(-50%);
            width: 40px;
            height: 2px;
            background: rgba(0, 200, 255, 0.2);
            margin-left: 4px;
        }

        .step:last-child::after {
            display: none;
        }

        .step.completed::after {
            background: #00ff88;
        }

        .form-step {
            display: none;
        }

        .form-step.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-group {
            position: relative;
        }

        .input-group .form-input {
            padding-right: 110px;
            height: 46px;
        }

        .send-code-btn {
            position: absolute;
            right: 6px;
            top: 69%;
            transform: translateY(-50%);
            padding: 8px 14px;
            background: rgba(0, 200, 255, 0.15);
            border: 1px solid rgba(0, 200, 255, 0.4);
            border-radius: 8px;
            color: #00c8ff;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-code-btn:hover:not(:disabled) {
            background: rgba(0, 200, 255, 0.25);
            border-color: #00c8ff;
        }

        .send-code-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
            padding-top: 15px;
            border-top: 1px solid rgba(0, 200, 255, 0.1);
        }

        .back-link a {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s ease;
        }

        .back-link a:hover {
            color: #00c8ff;
        }

        .form-step .btn-secondary {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="grid-lines"></div>
        <div class="floating-elements">
            <div class="float"></div>
            <div class="float"></div>
            <div class="float"></div>
            <div class="float"></div>
            <div class="float"></div>
        </div>
    </div>

    <div class="container">
        <div class="wrapper forgot-wrapper">
            <div class="form-section forgot-section">
                <div class="form-container">
                    <div class="logo">
                        <div class="logo-icon"><img src="images/logo.png" alt="睿城AI"></div>
                    </div>
                    
                    <h2 class="form-title">忘记密码</h2>
                    
                    <div class="step-indicator">
                        <div class="step active" data-step="1">
                            <div class="step-number">1</div>
                            <div class="step-label">输入账号</div>
                        </div>
                        <div class="step" data-step="2">
                            <div class="step-number">2</div>
                            <div class="step-label">验证身份</div>
                        </div>
                        <div class="step" data-step="3">
                            <div class="step-number">3</div>
                            <div class="step-label">设置密码</div>
                        </div>
                    </div>

                    <form id="forgot-form">
                        <div class="form-step active" id="step1">
                            <div class="form-group input-group">
                                <label class="form-label">手机号/邮箱</label>
                                <input type="text" class="form-input" id="account" placeholder="请输入手机号或邮箱">
                                <button type="button" class="send-code-btn" id="send-code-btn">发送验证码</button>
                            </div>
                            <button type="button" class="btn-primary" id="next-step1">下一步</button>
                        </div>

                        <div class="form-step" id="step2">
                            <div class="form-group">
                                <label class="form-label">验证码</label>
                                <input type="text" class="form-input" id="code" placeholder="请输入收到的验证码">
                            </div>
                            <button type="button" class="btn-primary" id="next-step2">下一步</button>
                            <button type="button" class="btn-secondary" id="back-step1">上一步</button>
                        </div>

                        <div class="form-step" id="step3">
                            <div class="form-group">
                                <label class="form-label">新密码</label>
                                <input type="password" class="form-input" id="new-password" placeholder="请输入新密码（至少6位）">
                            </div>
                            <div class="form-group">
                                <label class="form-label">确认密码</label>
                                <input type="password" class="form-input" id="confirm-password" placeholder="请再次输入新密码">
                            </div>
                            <button type="button" class="btn-primary" id="confirm-btn">确认修改</button>
                            <button type="button" class="btn-secondary" id="back-step2">上一步</button>
                        </div>
                    </form>

                    <div class="back-link">
                        <a href="index.html">返回登录</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="success-message" id="success-message">
        ✅ 操作成功！
    </div>

    <script src="js/forgot-password.js"></script>
</body>
</html>
